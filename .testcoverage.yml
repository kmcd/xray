# vladopajic/go-test-coverage config.
# https://github.com/vladopajic/go-test-coverage

profile: coverage.out
local-prefix: github.com/kmcd/xray

# v0.2.0 thresholds. Total catches regressions across the project; per-package
# is lenient because the connectors are HTTP-bound and exhaustive HTTP-path
# coverage requires VCR-style fixtures we don't yet ship. Per-file threshold
# stays at 0 to avoid noisy per-file flags.
threshold:
  file: 0
  package: 0
  total: 50

exclude:
  paths:
    # CLI glue — not worth gating; exercised via cobra tests in the same
    # package which still satisfy the per-package threshold.
    - ^cmd/xray
    # doc.go files anywhere — package-comment-only files.
    - doc\.go$
    # Parent packages with no executable code of their own.
    - ^internal/connector/
    - ^internal/connectors/$
    - ^internal/archive/
