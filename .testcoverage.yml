# vladopajic/go-test-coverage config.
# https://github.com/vladopajic/go-test-coverage

profile: coverage.out
local-prefix: github.com/kmcd/xray

# v0.3.0 thresholds. Per-package catches "agent added code with no test"
# regressions in packages where unit-test coverage is realistic. The
# githubactions connector is un-excluded after VCR cassettes landed in #66.
# The remaining four HTTP-bound connector subpackages (bugsnag, circleci,
# honeycomb, sentry) stay excluded until their cassettes land.
# Per-file threshold stays at 0 to avoid noisy per-file flags.
threshold:
  file: 0
  package: 30
  total: 50

exclude:
  paths:
    # CLI glue — not worth gating; exercised via cobra tests in the same
    # package which still satisfy the per-package threshold.
    - ^cmd/xray
    # doc.go files anywhere — package-comment-only files.
    - doc\.go$
    # Parent packages with no executable code of their own.
    - ^internal/connector/
    - ^internal/archive/
    # VCR test-helper package; exercised indirectly, not worth gating.
    - ^internal/connectors/vcr
    # HTTP-bound connector subpackages. Excluded until VCR fixtures land.
    # githubactions is un-excluded (VCR cassettes shipped in #66).
    - ^internal/connectors/bugsnag
    - ^internal/connectors/circleci
    - ^internal/connectors/honeycomb
    - ^internal/connectors/sentry
