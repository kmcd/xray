# vladopajic/go-test-coverage config.
# https://github.com/vladopajic/go-test-coverage

profile: coverage.out
local-prefix: github.com/kmcd/xray

# v0.2.0 thresholds. Per-package catches "agent added code with no test"
# regressions in the non-HTTP packages where unit-test coverage is realistic
# without VCR fixtures. HTTP-bound connector subpackages are excluded
# wholesale — exhaustive pagination/auth/retry coverage needs recorded
# fixtures we don't yet ship; tighten the exclusion as VCR-style harnesses
# land. Per-file threshold stays at 0 to avoid noisy per-file flags.
threshold:
  file: 0
  package: 30
  total: 50

exclude:
  paths:
    # CLI glue — not worth gating; exercised via cobra tests in the same
    # package which still satisfy the per-package threshold.
    - ^cmd/xray
    # doc.go files anywhere — package-comment-only files.
    - doc\.go$
    # Parent packages with no executable code of their own.
    - ^internal/connector/
    - ^internal/archive/
    # HTTP-bound connector subpackages. Excluded until VCR fixtures land;
    # the matching parent `^internal/connectors/` covers every subpackage.
    - ^internal/connectors/
