# PARKED until the repo flips public. `open-pull-requests-limit: 0` stops
# Dependabot from raising version-update PRs (security advisories may still
# flow). The fanout on first enable (9 PRs in 44 seconds, each kicking ci
# + codeql jobs) exhausted Free-tier Actions minutes on the private repo.
# When the repo goes public, restore the limit to 5 on both ecosystems.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 0
    commit-message:
      prefix: gomod
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 0
    commit-message:
      prefix: actions
    labels:
      - dependencies
      - github-actions
