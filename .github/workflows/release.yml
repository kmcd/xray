name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        id: goreleaser
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: generate subjects for provenance
        id: hash
        env:
          ARTIFACTS: "${{ steps.goreleaser.outputs.artifacts }}"
        run: |
          set -euo pipefail
          checksum_files=$(echo "$ARTIFACTS" | jq -r '.[] | select (.type=="Checksum") | .path')
          checksum_count=$(printf '%s\n' "$checksum_files" | grep -c .)
          if [[ "$checksum_count" -ne 1 ]]; then
            echo "::error::expected exactly one Checksum artifact, got $checksum_count" >&2
            exit 1
          fi
          echo "hashes=$(base64 -w0 < "$checksum_files")" >> "$GITHUB_OUTPUT"

  # slsa-github-generator MUST be referenced by semver tag, not SHA — the
  # SLSA verifier rejects provenance from non-tagged invocations. Scorecard's
  # Pinned-Dependencies check exempts this trusted reusable workflow.
  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      provenance-name: xray.intoto.jsonl
      upload-assets: true
