name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0.24.0
      - uses: goreleaser/goreleaser-action@v7
        id: goreleaser
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: generate subjects for provenance
        id: hash
        env:
          ARTIFACTS: "${{ steps.goreleaser.outputs.artifacts }}"
        run: |
          set -euo pipefail
          checksum_files=$(echo "$ARTIFACTS" | jq -r '.[] | select (.type=="Checksum") | .path')
          checksum_count=$(printf '%s\n' "$checksum_files" | grep -c .)
          if [[ "$checksum_count" -ne 1 ]]; then
            echo "::error::expected exactly one Checksum artifact, got $checksum_count" >&2
            exit 1
          fi
          echo "hashes=$(base64 -w0 < "$checksum_files")" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      provenance-name: xray.intoto.jsonl
      upload-assets: true
