version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nestif
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    # Practitioner-named sensors for AI-generated code (Böckeler,
    # Thoughtworks). Catch oversized functions, deep nesting, and copy-paste
    # blocks that default linter presets miss. Thresholds are set above the
    # v0.2.0 baseline so the sensor fires on *regressions* without forcing
    # a refactor sweep on existing connector code (which has legitimate
    # pagination + provenance + window-filtering branching). Tighten once
    # the connector surface stabilises — same doctrine as .testcoverage.yml.
    funlen:
      lines: 220
      statements: 140
    gocognit:
      min-complexity: 65
    gocyclo:
      min-complexity: 40
    nestif:
      min-complexity: 9
    dupl:
      threshold: 400
    depguard:
      # Encode the core/connector seam from CLAUDE.md as a lint-time rule:
      # core defines the canonical model + connector contract; concrete
      # connectors depend on core, never the reverse. Until now the seam was
      # enforced by code review only.
      rules:
        core-no-connectors:
          list-mode: lax
          files:
            - "**/internal/connector/**"
          deny:
            - pkg: "github.com/kmcd/xray/internal/connectors"
              desc: "internal/connector defines the contract; concrete connectors depend on it, not the reverse"
    errcheck:
      exclude-functions:
        # Stdio writes and defer-close are idiomatic; their errors are not
        # actionable in xray's CLI surface.
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*archive/tar.Writer).Close
        - (*compress/gzip.Writer).Close
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
    gosec:
      excludes:
        # G104: Audit errors not checked. Covered more precisely by errcheck.
        - G104
        # G122: TOCTOU symlink race in filepath.Walk callbacks. We walk our
        # own per-run clone directory; symlink TOCTOU is not a threat here.
        - G122
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - dupl
          - funlen
          - gocognit
          - gocyclo
          - nestif
      # internal/store/store.go is a serial, post-extract artifact writer
      # against a local SQLite file. Cancel-mid-write doesn't add value
      # (same character as the archive.WriteTarGz step per ADR 028 — runs
      # once, after the worker pool drains). Threading ctx through every
      # InsertX method is a substantive refactor; revisit if a future
      # scenario surfaces a real need.
      - path: ^internal/store/store\.go$
        linters:
          - noctx
      # DDL-roundtrip and postprocess tests exercise ~70 in-memory SQLite
      # calls. ctx threading buys no behaviour change in tests that hold
      # the DB lifetime entirely within a single subtest; the noctx sensor
      # still fires on production callers and on any non-DB ctx-less calls
      # within these files.
      - path: ^internal/model/schema_test\.go$
        linters:
          - noctx
      - path: ^internal/postprocess/postprocess_test\.go$
        linters:
          - noctx
