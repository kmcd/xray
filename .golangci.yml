version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - funlen
    - gocognit
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nestif
    - revive
    - staticcheck
    - unused
  settings:
    # Practitioner-named sensors for AI-generated code (Böckeler,
    # Thoughtworks). Catch oversized functions, deep nesting, and copy-paste
    # blocks that default linter presets miss. Thresholds are set above the
    # v0.2.0 baseline so the sensor fires on *regressions* without forcing
    # a refactor sweep on existing connector code (which has legitimate
    # pagination + provenance + window-filtering branching). Tighten once
    # the connector surface stabilises — same doctrine as .testcoverage.yml.
    funlen:
      lines: 100
      statements: 60
    gocognit:
      min-complexity: 60
    gocyclo:
      min-complexity: 25
    nestif:
      min-complexity: 8
    dupl:
      threshold: 200
    errcheck:
      exclude-functions:
        # Stdio writes and defer-close are idiomatic; their errors are not
        # actionable in xray's CLI surface.
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*archive/tar.Writer).Close
        - (*compress/gzip.Writer).Close
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
    gosec:
      excludes:
        # G104: Audit errors not checked. Covered more precisely by errcheck.
        - G104
        # G122: TOCTOU symlink race in filepath.Walk callbacks. We walk our
        # own per-run clone directory; symlink TOCTOU is not a threat here.
        - G122
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - dupl
          - funlen
          - gocognit
          - gocyclo
          - nestif
