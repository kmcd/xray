version: 2

project_name: xray

before:
  hooks:
    - go mod tidy

builds:
  - id: xray
    main: ./cmd/xray
    binary: xray
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: xray
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"

signs:
  - id: cosign
    cmd: cosign
    signature: ${artifact}.sig
    certificate: ${artifact}.pem
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto

# Formula and manifest are committed to this same repo (no separate
# kmcd/homebrew-xray / kmcd/scoop-xray repos). GoReleaser pushes both
# files on tag-release using the release workflow's GITHUB_TOKEN; the
# push target is `main`, so `main` branch-protection must allow the
# github-actions[bot] actor to bypass required reviews. If the push is
# blocked, switch `branch:` to a dedicated `dist-homebrew` /
# `dist-scoop` branch and update README install commands to add
# `--branch <name>` to the `brew tap` line.
brews:
  - name: xray
    repository:
      owner: kmcd
      name: xray
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    homepage: https://github.com/kmcd/xray
    description: Read-only extractor for engineering metrics — git, GitHub, CI, observability — into a portable .tar.gz
    license: Apache-2.0
    test: |
      system "#{bin}/xray", "version"

scoops:
  - repository:
      owner: kmcd
      name: xray
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    homepage: https://github.com/kmcd/xray
    description: Read-only extractor for engineering metrics
    license: Apache-2.0
