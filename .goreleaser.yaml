version: 2

project_name: xray

before:
  hooks:
    - go mod tidy

builds:
  - id: xray
    main: ./cmd/xray
    binary: xray
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: xray
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"

signs:
  - id: cosign
    cmd: cosign
    signature: ${artifact}.sig
    certificate: ${artifact}.pem
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto

# brews and scoops use `skip_upload: true`: GoReleaser renders the Formula +
# manifest into the workflow's local dist/ but does NOT try to push them to
# this repo. The push is handled out-of-band by scripts/publish-tap.sh
# (driven by the `/publish-tap` skill) running under the maintainer's admin
# identity, which bypasses `main` branch protection. The `github-actions[bot]`
# actor on a personal repo cannot be added as a Ruleset bypass actor
# (org-only feature), so this two-step flow replaces the conventional
# bot-push pattern. The `repository:` block is retained so a future
# org-migration can flip `skip_upload` back to false without recomputing
# tap content.
brews:
  - name: xray
    skip_upload: true
    repository:
      owner: kmcd
      name: xray
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    homepage: https://github.com/kmcd/xray
    description: Read-only extractor for engineering metrics — git, GitHub, CI, observability — into a portable .tar.gz
    license: Apache-2.0
    install: |
      bin.install "xray"
    test: |
      assert_match version.to_s, shell_output("#{bin}/xray version")

scoops:
  - skip_upload: true
    repository:
      owner: kmcd
      name: xray
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    homepage: https://github.com/kmcd/xray
    description: Read-only extractor for engineering metrics
    license: Apache-2.0
